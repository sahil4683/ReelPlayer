name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create launcher icons
        run: |
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          for size in 48 72 96 144 192; do
            case $size in
              48)  dir="mipmap-mdpi" ;;
              72)  dir="mipmap-hdpi" ;;
              96)  dir="mipmap-xhdpi" ;;
              144) dir="mipmap-xxhdpi" ;;
              192) dir="mipmap-xxxhdpi" ;;
            esac

            convert -size ${size}x${size} \
              -define gradient:angle=135 \
              gradient:'#E91E63-#C2185B' \
              -gravity center \
              -fill white \
              -pointsize $((size/3)) \
              -annotate 0 "R" \
              app/src/main/res/${dir}/ic_launcher.png

            cp app/src/main/res/${dir}/ic_launcher.png \
               app/src/main/res/${dir}/ic_launcher_round.png
          done

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ReelPlayer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
